name: build-linux

on:
  push:
    tags: ['v*']
    branches: [main]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Sync version
        run: |
          CODE=$(git rev-list --count HEAD)
          VER=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | cut -d+ -f1)
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then VER="${GITHUB_REF_NAME#v}"; fi
          sed -i "s/^version:.*/version: ${VER}+${CODE}/" pubspec.yaml
          dart run tool/update_version.dart

      - run: flutter pub get
      - run: flutter build linux --release

      - name: Package portable bundle
        run: |
          mkdir -p dist
          # Tar the *contents* of the bundle (aurora, data/, lib/ at top level)
          # so apply-update.sh can swap them in place. Reproducible flags.
          tar -C build/linux/x64/release/bundle \
            --sort=name --owner=0 --group=0 --mtime='1970-01-01' \
            -czf dist/aurora-linux-x64.tar.gz .

      - name: Publish to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/aurora-linux-x64.tar.gz
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: release

# Build the Android / Linux / Windows artifacts on a version tag and publish
# the update feed into THIS repo's updates/ folder (binaries + stable.json /
# beta.json). No secrets: the publish job pushes to its own repo with the
# automatic GITHUB_TOKEN. The website repo (geograms/geogram-html) then mirrors
# updates/ here into geogram.radio/updates via its own sync workflow — so the
# in-app updater reads geogram.radio with NO github.com runtime dependency.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Sync version + build number
        run: |
          CODE=$(git rev-list --count HEAD)
          VER=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | cut -d+ -f1)
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then VER="${GITHUB_REF_NAME#v}"; fi
          sed -i "s/^version:.*/version: ${VER}+${CODE}/" pubspec.yaml
          dart run tool/update_version.dart
      - run: flutter pub get
      - run: flutter build apk --release
      - run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/aurora.apk
      - uses: actions/upload-artifact@v4
        with:
          name: aurora-android
          path: dist/aurora.apk

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Sync version
        run: |
          CODE=$(git rev-list --count HEAD)
          VER=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | cut -d+ -f1)
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then VER="${GITHUB_REF_NAME#v}"; fi
          sed -i "s/^version:.*/version: ${VER}+${CODE}/" pubspec.yaml
          dart run tool/update_version.dart
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package portable bundle
        run: |
          mkdir -p dist
          tar -C build/linux/x64/release/bundle \
            --sort=name --owner=0 --group=0 --mtime='1970-01-01' \
            -czf dist/aurora-linux-x64.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: aurora-linux
          path: dist/aurora-linux-x64.tar.gz

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Sync version
        shell: bash
        run: |
          CODE=$(git rev-list --count HEAD)
          VER=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | cut -d+ -f1)
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then VER="${GITHUB_REF_NAME#v}"; fi
          sed -i "s/^version:.*/version: ${VER}+${CODE}/" pubspec.yaml
          dart run tool/update_version.dart
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Build Inno Setup installer
        shell: cmd
        run: |
          "%ProgramFiles(x86)%\Inno Setup 6\ISCC.exe" installer\aurora.iss
      - uses: actions/upload-artifact@v4
        with:
          name: aurora-windows
          path: build/installer/aurora-windows-x64-setup.exe

  publish:
    needs: [android, linux, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write        # push the feed back to this repo (no secret)
    steps:
      # Check out main (not the tag) so we commit the feed onto the branch.
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: dart-lang/setup-dart@v1
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish feed into updates/
        run: |
          VER="${GITHUB_REF_NAME#v}"
          # Run standalone (the tool imports only dart: libraries) so we don't
          # need to resolve the Flutter package's dependencies here.
          cp tool/publish_release.dart "${RUNNER_TEMP}/publish_release.dart"
          dart "${RUNNER_TEMP}/publish_release.dart" \
            --site . \
            --version "${VER}" \
            --name "Geogram Aurora ${VER}" \
            --keep 3 \
            artifacts/aurora-android/aurora.apk \
            artifacts/aurora-linux/aurora-linux-x64.tar.gz \
            artifacts/aurora-windows/aurora-windows-x64-setup.exe
      - name: Commit & push feed
        run: |
          git config user.name 'geogram-ci'
          git config user.email 'ci@geogram.radio'
          git add updates
          git commit -m "Publish update feed for ${GITHUB_REF_NAME}" || echo "nothing to commit"
          git push origin main

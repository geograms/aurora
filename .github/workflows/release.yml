name: release

# Build the Android / Linux / Windows artifacts on a version tag and attach them
# to a GitHub Release on THIS repo as assets (NOT committed to git, so the source
# repo stays lean). No secrets: uses the automatic GITHUB_TOKEN. The website repo
# (geograms/geogram-html) sync.yml then downloads these release assets, builds
# the feed (stable.json/beta.json), and hosts the binaries at geogram.radio/
# updates — the only place the app fetches from (NO github.com runtime dependency).

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    # Hoisted to job level so the signing step's `if` can gate on it — the
    # `secrets` context is not allowed in a step-level `if`, only `env` is.
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
    steps:
      - uses: actions/checkout@v4
      # pubspec.yaml has a path dependency on ../reticulum-dart (a sibling repo
      # not checked out by default). Clone it next to the workspace so the very
      # first `pub get` (run by flutter-action's setup) can resolve it.
      - name: Fetch reticulum-dart (path dependency)
        shell: bash
        run: git clone --depth 1 https://github.com/geograms/reticulum-dart.git ../reticulum-dart
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Sync version + build number
        run: |
          CODE=$(git rev-list --count HEAD)
          VER=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | cut -d+ -f1)
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then VER="${GITHUB_REF_NAME#v}"; fi
          sed -i "s/^version:.*/version: ${VER}+${CODE}/" pubspec.yaml
          dart run tool/update_version.dart
      - run: flutter pub get
      # Reconstruct the persistent release keystore from repo secrets so every
      # tag build signs with the SAME key. Without this, each runner signs with
      # its own throwaway debug key and Android rejects the upgrade as an invalid
      # package. Skips (falls back to debug signing) if the secret is unset.
      - name: Configure release signing
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/geogram-release.jks
          cat > android/key.properties <<EOF
          storeFile=geogram-release.jks
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF
      # Universal APK (direct sideload / GitHub-API marketing page) AND per-ABI
      # splits (~40 MB each) — the website (GitHub Pages, 100 MB/file git limit)
      # hosts only the splits; the app downloads the one matching its ABI.
      - run: flutter build apk --release
      - run: flutter build apk --release --split-per-abi
      - run: |
          mkdir -p dist
          apk=build/app/outputs/flutter-apk
          cp "$apk/app-release.apk" dist/aurora.apk
          cp "$apk/app-arm64-v8a-release.apk"   dist/aurora-android-arm64-v8a.apk
          cp "$apk/app-armeabi-v7a-release.apk" dist/aurora-android-armeabi-v7a.apk
          cp "$apk/app-x86_64-release.apk"      dist/aurora-android-x86_64.apk
          ls -lh dist
      - uses: actions/upload-artifact@v4
        with:
          name: aurora-android
          path: dist/

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch reticulum-dart (path dependency)
        shell: bash
        run: git clone --depth 1 https://github.com/geograms/reticulum-dart.git ../reticulum-dart
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libsecret-1-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Sync version
        run: |
          CODE=$(git rev-list --count HEAD)
          VER=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | cut -d+ -f1)
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then VER="${GITHUB_REF_NAME#v}"; fi
          sed -i "s/^version:.*/version: ${VER}+${CODE}/" pubspec.yaml
          dart run tool/update_version.dart
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package portable bundle
        run: |
          mkdir -p dist
          tar -C build/linux/x64/release/bundle \
            --sort=name --owner=0 --group=0 --mtime='1970-01-01' \
            -czf dist/aurora-linux-x64.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: aurora-linux
          path: dist/aurora-linux-x64.tar.gz

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch reticulum-dart (path dependency)
        shell: bash
        run: git clone --depth 1 https://github.com/geograms/reticulum-dart.git ../reticulum-dart
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Sync version
        shell: bash
        run: |
          CODE=$(git rev-list --count HEAD)
          VER=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | cut -d+ -f1)
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then VER="${GITHUB_REF_NAME#v}"; fi
          sed -i "s/^version:.*/version: ${VER}+${CODE}/" pubspec.yaml
          dart run tool/update_version.dart
      - run: flutter pub get
      # wasm_run_flutter's CMake downloads a native runtime tarball and extracts
      # it with `cmake -E tar` (libarchive), but the extract path runs through the
      # .plugin_symlinks/wasm_run_flutter symlink — libarchive refuses to extract
      # through a symlink, failing the build. Its CMake skips the download+extract
      # when the DLL already exists, so pre-extract it into the REAL pub-cache
      # location (no symlink in that path); CMake's EXISTS check then resolves
      # through the symlink, finds it, and skips its own broken extraction.
      - name: Pre-fetch wasm_run native runtime (avoid CMake extract-through-symlink)
        shell: bash
        run: |
          set -euo pipefail
          # cygpath the WHOLE path so it's unix-style (/c/Users/…): a C:\ path
          # makes GNU tar treat "C:" as a remote rmt host ("cannot connect to C:").
          PUBCACHE="$(cygpath "${PUB_CACHE:-$LOCALAPPDATA/Pub/Cache}")"
          PLUGIN=$(ls -d "$PUBCACHE"/hosted/*/wasm_run_flutter-*/windows 2>/dev/null | head -1)
          if [ -z "${PLUGIN:-}" ]; then echo "wasm_run_flutter not in pub cache?"; exit 1; fi
          VER=$(grep -oE 'wasm_run-v[0-9.]+' "$PLUGIN/CMakeLists.txt" | head -1)
          LIBROOT="$PLUGIN/$VER"
          if [ ! -f "$LIBROOT/windows-x64/wasm_run_dart.dll" ]; then
            mkdir -p "$LIBROOT"
            curl -fL -o "$PLUGIN/$VER.tar.gz" \
              "https://github.com/juancastillo0/wasm_run/releases/download/$VER/other.tar.gz"
            tar -xzf "$PLUGIN/$VER.tar.gz" -C "$LIBROOT"
          fi
          ls -la "$LIBROOT/windows-x64/"
      # MSVC 14.51 (VS 2022 18.x on windows-latest) turns <experimental/coroutine>
      # into a hard error (STL1011); several BLE/permission plugins still include
      # it. CL prepends this define to every cl.exe call so the plugins compile.
      - run: flutter build windows --release
        env:
          CL: /D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS
      - name: Build Inno Setup installer
        shell: cmd
        run: |
          "%ProgramFiles(x86)%\Inno Setup 6\ISCC.exe" installer\aurora.iss
      - uses: actions/upload-artifact@v4
        with:
          name: aurora-windows
          path: build/installer/aurora-windows-x64-setup.exe

  publish:
    # Wait for all three so the Windows installer is attached when its build is
    # green, but only REQUIRE Android + Linux: a Windows failure must never block
    # shipping them (its build has been fragile — wasm_run_flutter plugin symlinks).
    needs: [android, linux, windows]
    runs-on: ubuntu-latest
    if: ${{ always() && startsWith(github.ref, 'refs/tags/') && needs.android.result == 'success' && needs.linux.result == 'success' }}
    permissions:
      contents: write        # create a GitHub Release on THIS repo (no secret)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect assets
        run: |
          mkdir -p dist
          cp artifacts/aurora-android/*.apk dist/
          cp artifacts/aurora-linux/aurora-linux-x64.tar.gz dist/
          # Windows is optional (see the publish job's needs) — attach it only if
          # its job produced the installer this run.
          if [ -f artifacts/aurora-windows/aurora-windows-x64-setup.exe ]; then
            cp artifacts/aurora-windows/aurora-windows-x64-setup.exe dist/
          else
            echo "::warning::Windows installer not built this run — publishing Android + Linux only."
          fi
      # Publish the binaries as GitHub Release assets — NOT committed to git, so
      # the source repo stays lean. The website's sync.yml downloads these and
      # hosts them at geogram.radio/updates (the only place the app fetches from).
      - name: Create GitHub Release with binaries as assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

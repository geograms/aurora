; Standalone RNS-over-BLE5 sniffer firmware for the LilyGO T-Dongle-S3.
; Receives Reticulum announces sent by the Aurora phones over BLE 5 extended
; advertising (manufacturer id 0xFFFF, marker 0x3E, subtype 0x55) and prints the
; decoded chat text over serial. Isolated from the main APRS firmware so enabling
; NimBLE extended advertising can't affect it.
;
;   build:   ~/.platformio/penv/bin/pio run -e rns_ble5
;   flash:   ~/.platformio/penv/bin/pio run -e rns_ble5 -t upload
;   monitor: ~/.platformio/penv/bin/pio device monitor -b 115200 -p /dev/ttyACM0
[env:rns_ble5]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_upload.flash_size = 16MB
; 2MB factory app (LVGL + WiFi + APRS-IS outgrow 1MB); NVS stays at 0x9000 so the
; RNS identity persists. PlatformIO uses this for the size check too.
board_build.partitions = partitions.csv
upload_protocol = esp-builtin
; lv_conf.h lives in geogram_lvgl; LVGL finds it via __has_include/LV_CONF_INCLUDE_SIMPLE
; on the include path. These -I flags are cloned into every component compile env
; (incl. lvgl__lvgl + the UI), exactly like the main firmware's tdongle_s3 env.
; geogram_lvgl / managed_components are symlinked into this project dir, so the
; paths are relative to the project (no "..", which PlatformIO resolves oddly).
build_flags =
    -Icomponents/geogram_lvgl
    -Imanaged_components/lvgl__lvgl
    -Imanaged_components/lvgl__lvgl/src

name: aurora
description: "Aurora — geogram wapp launcher."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.6+173

environment:
  sdk: ^3.10.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.0
  wasm_run_flutter: ^0.1.0
  ffi: ^2.1.0
  highlighting: ^0.9.0+11.8.0            # Dart port of highlight.js
  flutter_highlighting: ^0.9.0+11.8.0    # Flutter themes for highlighting
  flutter_svg: ^2.0.10+1                 # SVG rendering for wapp icons
  qr_flutter: ^4.1.0                     # QR code rendering for the GeoUI "qr" field
  file_selector: ^1.0.3                  # Native file picker (Linux: GTK)
  crypto: ^3.0.3                         # SHA256 for NOSTR event ids + wapp hashing
  pointycastle: ^3.9.1                   # secp256k1 / BIP-340 Schnorr
  cryptography: ^2.7.0                   # pure-Dart X25519/Ed25519/ChaCha20-Poly1305/HKDF for the Dart I2P node
  battery_plus: ^6.0.0                   # battery level/charging — power governor pauses background work on low battery
  bech32: ^0.2.2                         # npub / nsec encoding
  hex: ^0.2.0                            # hex ↔ bytes
  http: ^1.2.0                           # Cross-platform HTTP (native + web)
  archive: ^3.6.1                        # Pure-Dart zip extraction for .wapp bundles
  web: ^0.5.1                            # window.localStorage for web profile persistence
  sqlite3: ^2.4.0                        # SQLite for wapp social store (reactions, comments)
  sqlite3_flutter_libs: ^0.5.24          # Native SQLite libs for Flutter builds
  # Video playback (media_kit / libmpv) is NOT bundled — it bloats the app
  # (tens of MB of native libs per ABI). The media.video capability is a
  # pluggable backend (see lib/wapp/native/media_capability.dart); a media
  # backend is added as an optional feature rather than shipped in the base app.
  flutter_pcm_sound: ^3.3.3            # raw PCM speaker sink (Android/iOS/macOS) for wasm-decoded audio
  path_provider: ^2.1.4                   # Writable app data dir on Android/iOS (no $HOME there)
  permission_handler: ^11.3.1             # Runtime permission requests (Android BLE/location/notify)
  geolocator: ^12.0.0                      # Device GPS for the hal_sensor_gps_* HAL (real phone position)
  ble_peripheral: ^2.4.0                  # Reliable BLE advertising on Android/iOS (geogram's choice)
  bluetooth_low_energy: ^6.0.0            # BLE central (scan) + peripheral (advertise) for APRS-over-BLE
  bluez: ^0.8.2                           # BlueZ D-Bus client — Linux BLE advertising (peripheral)
  dbus: ^0.7.10                           # D-Bus values for the BlueZ advertising payload
  # 0.5.4 (pinned via the path override below) bundles the parser, tracker, DHT
  # and dtorrent_common, so those are no longer separate dependencies.
  dtorrent_task_v2: ^0.5.4
  b_encode_decode: ^1.0.5
  events_emitter2: ^1.0.4
  reticulum:
    path: ../reticulum-dart

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/hello_world.wasm
    - assets/terminal_settings.ui.json
    # First-run default wapps, bundled as flat .wapp (zip) files so they can
    # be seeded on devices where the in-repo ../wapps library isn't present
    # (Android/iOS, packaged desktop). See lib/launcher/seeding.dart.
    - assets/wapps/
    # Built-in wapp editor, installed to storage on boot (see
    # lib/editor/editor_install.dart). Each subdir is listed explicitly —
    # Flutter does not recurse into nested asset folders.
    - assets/editor/app-creator/
    - assets/editor/app-creator/screens/
    - assets/editor/app-creator/lang/
    - assets/editor/app-creator/media/icons/
    - assets/editor/app-creator/store/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

dependency_overrides:
  dtorrent_task_v2:
    path: third_party/dtorrent_task_v2
  xml: 6.5.0
